spec_version: 1
name: CloudIncidentEnv
type: space
runtime: fastapi
app: server.app:app
port: 8000
description: >
  Cloud Infrastructure Incident Response environment with OpenEnv reference structure for
  clip-case review, quality-rule refinement, and deterministic scoring.
tags:
  - openenv
  - reinforcement-learning
  - clip-quality
  - quality-analysis
  - clip-review
  - hackathon-2026

tasks:
  - id: task_easy
    difficulty: easy
    file: server/tasks/task_easy.py
    grader: graders.py:grade_task
    max_score: 1.0

  - id: task_medium
    difficulty: medium
    file: server/tasks/task_medium.py
    grader: graders.py:grade_task
    max_score: 1.0

  - id: task_hard
    difficulty: hard
    file: server/tasks/task_hard.py
    grader: graders.py:grade_task
    max_score: 1.0
